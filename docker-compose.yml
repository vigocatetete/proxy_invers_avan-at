services:
  apache1:
    image: httpd:latest
    container_name: apache1
    volumes:
      - ./web:/usr/local/apache2/htdocs/
    networks:
      - app-network

  apache2:
    image: httpd:latest
    container_name: apache2
    volumes:
      - ./web:/usr/local/apache2/htdocs/
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - apache1
      - apache2
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
